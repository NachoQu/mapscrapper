<!DOCTYPE html>
<html>
<head>
  <title>Google Maps Easy Scrape</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { 
      min-width: 570px; 
      padding: 20px; 
      font-family: 'Poppins', sans-serif; 
    }
    #message {
      font-size: 16px;
      padding-top: 20px;
      padding-bottom: 20px;
      text-decoration: none;
    }
    .button {

      padding: 10px 20px; 
      border: none;
      color: white;
      background-color: #007BFF;
      cursor: pointer; 
      transition: background-color 0.3s ease; 
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
    }
    .button:hover {
      background-color: #0056b3; 
    }
    .input {
      padding: 8px 15px;
      margin-right: 10px; 
      border: 1px solid #ddd;
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      padding-top: 12px;
      padding-bottom: 12px;
      text-align: left;
      background-color: #dddddd;
    }
    h1 {
      font-weight: 600;
      font-size: 24px;
      margin: 0;
    }
    h4 {
      margin: 0;
      padding-top: 10px;
    }
    h4 a {
      color: #676767;
      text-decoration: none;
    }
    h4 a:hover {
      color: #007BFF;
      text-decoration: none;
    }
    .lead-high {
      background-color: #d4edda !important;
      font-weight: bold;
    }
    .lead-medium {
      background-color: #fff3cd !important;
    }
    .lead-low {
      background-color: #f8d7da !important;
    }
    .stats-highlight {
      color: #28a745;
      font-weight: bold;
    }
    .table-responsive {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>  
</head>
<body>
  <h1>&#x1F5FA;&#xFE0F; Google Maps Easy Scrape</h1>
  <h4>
    <a href="https://www.youtube.com/@itsmikepowers" target="_blank">By Mike</a> 
    <a href="https://www.buymeacoffee.com/itsmikepowers" target="_blank">Buy Me A Coffee :)</a>
  </h4>
  <div id="message">Checking URL...</div>
  <div id="progressContainer" style="display: none; margin: 10px 0;">
    <div id="progressBar" style="width: 100%; background-color: #f0f0f0; border-radius: 10px; overflow: hidden;">
      <div id="progressFill" style="width: 0%; height: 20px; background-color: #007BFF; transition: width 0.3s ease;"></div>
    </div>
    <div id="progressText" style="text-align: center; margin-top: 5px; font-size: 14px; color: #666;"></div>
  </div>
  <div id="statsContainer" style="display: none; margin: 10px 0; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 4px solid #007BFF;">
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; font-size: 14px;">
      <div style="text-align: center; padding: 8px; background: white; border-radius: 6px;">
        <div style="font-size: 18px; font-weight: bold; color: #007BFF;" id="totalLeads">0</div>
        <div>Total Leads</div>
      </div>
      <div style="text-align: center; padding: 8px; background: white; border-radius: 6px;">
        <div style="font-size: 18px; font-weight: bold; color: #28a745;" id="highValueLeads">0</div>
        <div>Alto Valor (8-10)</div>
      </div>
      <div style="text-align: center; padding: 8px; background: white; border-radius: 6px;">
        <div style="font-size: 18px; font-weight: bold; color: #ffc107;" id="withPhone">0</div>
        <div>Con Teléfono</div>
      </div>
      <div style="text-align: center; padding: 8px; background: white; border-radius: 6px;">
        <div style="font-size: 18px; font-weight: bold; color: #17a2b8;" id="withEmail">0</div>
        <div>Con Email</div>
      </div>
    </div>
    <div style="margin-top: 10px; text-align: center; font-size: 12px; color: #666;">
      <span>Con Web: <strong id="withWeb">0</strong></span> | 
      <span>Con Redes: <strong id="withSocial">0</strong></span> | 
      <span>Promedio Rating: <strong id="avgRating">0</strong></span>
    </div>
  </div>
  <button id="actionButton" class="button" disabled>Scrape Google Maps</button>
  <button id="downloadCsvButton" class="button" style="margin-left: 10px;" disabled>Download as CSV</button>
  <button id="downloadJsonButton" class="button" style="margin-left: 10px;" disabled>Download as JSON</button>
  <input type="text" id="filenameInput" class="input" placeholder="Enter file name" style="margin-left: 10px;" />
  <div class="table-responsive">
    <table id="resultsTable">
      <thead>
        <tr>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
  <script src="popup.js"></script>
</body>
</html>
